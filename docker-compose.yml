services:
  # ESP-IDF development environment
  esp-idf:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Match the host UID/GID so build outputs in the bind-mounted
        # workspace are owned by the developer, not root. See issue #318.
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: mcu-tinkering-lab/esp-idf:v5.4
    volumes:
      # Mount the entire workspace (build output stays on host for flashing)
      - .:/workspace
      # Cache ESP-IDF tools
      - esp-idf-tools:/opt/esp
    # Uncomment to access USB devices (adjust device paths as needed)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyUSB1:/dev/ttyUSB1
    # privileged: true  # Required for USB device access
    environment:
      - IDF_PATH=/opt/esp/idf
      - IDF_TOOLS_PATH=/opt/esp
      # Preserve user permissions
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
    working_dir: /workspace
    stdin_open: true
    tty: true
    network_mode: host  # For mDNS and network testing

  # Raspberry Pi Pico SDK development environment (RP2040/RP2350)
  pico-sdk:
    build:
      context: .
      dockerfile: Dockerfile.pico
      args:
        # Match the host UID/GID so build outputs in the bind-mounted
        # workspace are owned by the developer, not root. See issue #318.
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: mcu-tinkering-lab/pico-sdk:2.2.0
    volumes:
      # Mount the entire workspace (build output stays on host for flashing)
      - .:/workspace
    environment:
      - PICO_SDK_PATH=/opt/pico-sdk
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  # Persistent volumes for caching
  esp-idf-tools:
    name: mcu-tinkering-lab-esp-idf-tools
