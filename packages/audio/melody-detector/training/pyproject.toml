[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/melody_train"]

[project]
name = "melody-train"
version = "0.1.0"
description = "Synthetic dataset, training, and ESP-PPQ quantization pipeline for the melody-detector ROI classifier"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11,<3.13"

dependencies = [
    "numpy>=1.26",
    "pillow>=10.0",
    "albumentations>=1.4",
    "click>=8.1",
]

[project.optional-dependencies]
train = [
    "torch>=2.2",
    "torchvision>=0.17",
]
quantize = [
    # B4 — pinned at slice time once the ESP-PPQ install path is exercised
    "esp-ppq",
    "onnx>=1.16",
    "onnxruntime>=1.17",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.5",
    "ty",
]

[project.scripts]
melody-gen = "melody_train.gen:main"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",  # line length — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*" = ["S101", "ARG"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ty]
[tool.ty.src]
include = ["src"]

[tool.ty.rules]
unresolved-import = "ignore"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["src/melody_train"]
omit = ["*/tests/*", "*/__init__.py"]
