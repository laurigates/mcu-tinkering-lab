name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'tools/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.pre-commit-config.yaml'
      - '.clang-format'
      - 'justfile'

jobs:
  claude-review:
    uses: laurigates/.github/.github/workflows/reusable-claude-review.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
