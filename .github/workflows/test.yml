name: Test Suite

on:
  push:
    branches: [main, develop, 'claude/**']
    paths:
      - 'packages/**'
      - '.github/workflows/test.yml'
      - '.pre-commit-config.yaml'
      - '.clang-format'
      - '.gitleaks.toml'
      - 'tools/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/**'
      - '.github/workflows/test.yml'
      - '.pre-commit-config.yaml'
      - '.clang-format'
      - '.gitleaks.toml'
      - 'tools/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      c-code: ${{ steps.filter.outputs.c-code }}
      any-code: ${{ steps.filter.outputs.any-code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            python:
              - 'packages/esp32-projects/robocar-simulation/**'
            c-code:
              - 'packages/esp32-projects/**/main/**'
              - 'packages/esp32-projects/**/components/**'
              - 'packages/esp32-projects/**/*.c'
              - 'packages/esp32-projects/**/*.h'
              - 'packages/esp32-projects/**/*.cpp'
              - 'packages/esp32-projects/**/*.hpp'
              - '.clang-format'
            any-code:
              - 'packages/**'
              - '.pre-commit-config.yaml'
              - '.clang-format'
              - '.gitleaks.toml'
              - 'tools/**'

  code-quality:
    name: Code Quality Checks
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.any-code == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  test-python-simulation:
    name: Python Simulation Tests
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.python == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: packages/esp32-projects/robocar-simulation
        run: uv sync --extra dev

      - name: Run tests with coverage
        working-directory: packages/esp32-projects/robocar-simulation
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v || true

      - name: Archive coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ github.sha }}
          path: |
            packages/esp32-projects/robocar-simulation/coverage.xml
            packages/esp32-projects/robocar-simulation/htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: packages/esp32-projects/robocar-simulation/coverage.xml
          flags: simulation
          name: robocar-simulation
        continue-on-error: true

  # Placeholder for future ESP32 host-based tests
  test-esp32-host:
    name: ESP32 Host-Based Tests
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.c-code == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for test directories
        id: check-tests
        run: |
          # Only look for host-test directories in project main trees,
          # excluding managed_components (downloaded deps) and component
          # internal test dirs which are not standalone host test projects.
          if find packages/esp32-projects -type d -name "test" \
               -not -path "*/managed_components/*" \
               -not -path "*/components/*/test" | grep -q .; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
            echo "::notice::No ESP32 test directories found yet. Skipping host tests."
          fi

      - name: Setup ESP-IDF
        if: steps.check-tests.outputs.tests_exist == 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32
          command: echo "ESP-IDF environment ready for host tests"

      - name: Run host-based tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          echo "Running ESP32 host-based tests..."
          # TODO: Add host test execution when test directories are created
          # Example: cd packages/esp32-projects/robocar-main/test && idf.py build
          echo "::notice::Host-based test framework ready. Add tests to enable."

  lint-c:
    name: C/C++ Linting
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.c-code == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          find packages/esp32-projects \
            -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) \
            ! -path "*/managed_components/*" \
            ! -path "*/components/esp-idf-lib/*" \
            ! -path "*/external/*" \
            ! -path "*/build/*" \
            ! -path "*/.esphome/*" \
            -print0 | \
          xargs -0 cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=unusedStructMember \
            --inline-suppr \
            --error-exitcode=0 \
            --template=gcc \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-report-${{ github.sha }}
          path: cppcheck-report.txt
          retention-days: 30

  format-check:
    name: Format Check
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.c-code == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install clang-format
        # Pin to 18.1.8 to match the pre-commit hook (mirrors-clang-format v18.1.8).
        # Ubuntu 24.04's apt clang-format is 18.1.3, which disagrees with 18.1.8 on
        # brace-wrapping in macro initializers, causing the Format Check and
        # Code Quality (pre-commit) jobs to contradict each other.
        run: pipx install clang-format==18.1.8

      - name: Check C/C++ formatting
        run: |
          find packages/esp32-projects \
            -type f \( -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) \
            ! -path "*/managed_components/*" \
            ! -path "*/components/esp-idf-lib/*" \
            ! -path "*/external/*" \
            ! -path "*/build/*" \
            ! -path "*/.esphome/*" \
            -print0 | \
          xargs -0 clang-format --dry-run --Werror --style=file || {
            echo "::error::Code formatting issues found. Run 'make format-c' to fix."
            exit 1
          }

  test-summary:
    name: Test Summary
    needs: [detect-changes, code-quality, test-python-simulation, test-esp32-host, lint-c, format-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python Simulation Tests: ${{ needs.test-python-simulation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ESP32 Host Tests: ${{ needs.test-esp32-host.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- C/C++ Linting: ${{ needs.lint-c.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Format Check: ${{ needs.format-check.result }}" >> $GITHUB_STEP_SUMMARY

          # Fail only on actual failures, not skips
          for result in \
            "${{ needs.code-quality.result }}" \
            "${{ needs.format-check.result }}"; do
            if [ "$result" = "failure" ]; then
              echo "::error::Critical quality checks failed!"
              exit 1
            fi
          done

          echo "::notice::All test checks completed!"
