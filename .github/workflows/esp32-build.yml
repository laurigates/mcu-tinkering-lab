name: ESP32 Build Pipeline

on:
  push:
    branches: [main, develop, 'claude/**']
    paths:
      - 'packages/esp32-projects/**'
      - '.github/workflows/esp32-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/esp32-projects/**'
      - '.github/workflows/esp32-build.yml'
  workflow_dispatch:

env:
  IDF_VERSION: 'v5.4'

jobs:
  detect-changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-firmware-changes: ${{ steps.set-matrix.outputs.has-firmware-changes }}
      simulation-changed: ${{ steps.filter.outputs.simulation || 'true' }}
      audiobook-player-changed: ${{ steps.filter.outputs.audiobook-player || 'true' }}
      esp32-wireguard-ha-changed: ${{ steps.filter.outputs.esp32-wireguard-ha || 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            robocar-main:
              - 'packages/esp32-projects/robocar-main/**'
            robocar-camera:
              - 'packages/esp32-projects/robocar-camera/**'
            esp32cam-llm-telegram:
              - 'packages/esp32-projects/esp32cam-llm-telegram/**'
            esp32-cam-webserver:
              - 'packages/esp32-projects/esp32-cam-webserver/**'
            esp32-cam-i2s-audio:
              - 'packages/esp32-projects/esp32-cam-i2s-audio/**'
            esp32-wifitest:
              - 'packages/esp32-projects/esp32-wifitest/**'
            it-troubleshooter:
              - 'packages/esp32-projects/it-troubleshooter/**'
            kids-audio-toy:
              - 'packages/esp32-projects/kids-audio-toy/**'
            nfc-scavenger-hunt:
              - 'packages/esp32-projects/nfc-scavenger-hunt/**'
            switch-usb-proxy:
              - 'packages/esp32-projects/switch-usb-proxy/**'
            xbox-switch-bridge:
              - 'packages/esp32-projects/xbox-switch-bridge/**'
            audiobook-player:
              - 'packages/esp32-projects/audiobook-player/**'
            esp32-wireguard-ha:
              - 'packages/esp32-projects/esp32-wireguard-ha-example/**'
            simulation:
              - 'packages/esp32-projects/robocar-simulation/**'
            workflow:
              - '.github/workflows/esp32-build.yml'

      - name: Build dynamic matrix
        id: set-matrix
        run: |
          ALL_PROJECTS='{"include":[
            {"project":"robocar-main","target":"esp32","description":"Main Controller (Heltec WiFi LoRa 32)"},
            {"project":"robocar-camera","target":"esp32","description":"Camera Module (ESP32-CAM)"},
            {"project":"esp32cam-llm-telegram","target":"esp32","description":"LLM Telegram Bot (ESP32-CAM)"},
            {"project":"esp32-cam-webserver","target":"esp32","description":"Webserver (ESP32-CAM)"},
            {"project":"esp32-cam-i2s-audio","target":"esp32","description":"Camera I2S Audio (ESP32-CAM)"},
            {"project":"kids-audio-toy","target":"esp32","description":"Kids Audio Toy (ESP32)"},
            {"project":"esp32-wifitest","target":"esp32s3","description":"WiFi Test (ESP32-S3)"},
            {"project":"it-troubleshooter","target":"esp32s3","description":"IT Troubleshooter (ESP32-S3-Zero)"},
            {"project":"nfc-scavenger-hunt","target":"esp32s3","description":"NFC Scavenger Hunt (ESP32-S3)"},
            {"project":"switch-usb-proxy","target":"esp32s3","description":"Switch USB Proxy (ESP32-S3)"},
            {"project":"xbox-switch-bridge","target":"esp32s3","description":"Xbox-Switch Bridge (ESP32-S3-Zero)","fetch_deps":true}
          ]}'

          # Build everything on manual dispatch or workflow file changes
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            echo "matrix=$(echo "$ALL_PROJECTS" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has-firmware-changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build matrix from changed projects only
          INCLUDES="[]"

          add_project() {
            local proj="$1" target="$2" desc="$3" deps="${4:-}"
            if [ -n "$deps" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c --arg p "$proj" --arg t "$target" --arg d "$desc" \
                '. + [{"project":$p,"target":$t,"description":$d,"fetch_deps":true}]')
            else
              INCLUDES=$(echo "$INCLUDES" | jq -c --arg p "$proj" --arg t "$target" --arg d "$desc" \
                '. + [{"project":$p,"target":$t,"description":$d}]')
            fi
          }

          [ "${{ steps.filter.outputs.robocar-main }}" = "true" ] && \
            add_project "robocar-main" "esp32" "Main Controller (Heltec WiFi LoRa 32)"
          [ "${{ steps.filter.outputs.robocar-camera }}" = "true" ] && \
            add_project "robocar-camera" "esp32" "Camera Module (ESP32-CAM)"
          [ "${{ steps.filter.outputs.esp32cam-llm-telegram }}" = "true" ] && \
            add_project "esp32cam-llm-telegram" "esp32" "LLM Telegram Bot (ESP32-CAM)"
          [ "${{ steps.filter.outputs.esp32-cam-webserver }}" = "true" ] && \
            add_project "esp32-cam-webserver" "esp32" "Webserver (ESP32-CAM)"
          [ "${{ steps.filter.outputs.esp32-cam-i2s-audio }}" = "true" ] && \
            add_project "esp32-cam-i2s-audio" "esp32" "Camera I2S Audio (ESP32-CAM)"
          [ "${{ steps.filter.outputs.kids-audio-toy }}" = "true" ] && \
            add_project "kids-audio-toy" "esp32" "Kids Audio Toy (ESP32)"
          [ "${{ steps.filter.outputs.esp32-wifitest }}" = "true" ] && \
            add_project "esp32-wifitest" "esp32s3" "WiFi Test (ESP32-S3)"
          [ "${{ steps.filter.outputs.it-troubleshooter }}" = "true" ] && \
            add_project "it-troubleshooter" "esp32s3" "IT Troubleshooter (ESP32-S3-Zero)"
          [ "${{ steps.filter.outputs.nfc-scavenger-hunt }}" = "true" ] && \
            add_project "nfc-scavenger-hunt" "esp32s3" "NFC Scavenger Hunt (ESP32-S3)"
          [ "${{ steps.filter.outputs.switch-usb-proxy }}" = "true" ] && \
            add_project "switch-usb-proxy" "esp32s3" "Switch USB Proxy (ESP32-S3)"
          [ "${{ steps.filter.outputs.xbox-switch-bridge }}" = "true" ] && \
            add_project "xbox-switch-bridge" "esp32s3" "Xbox-Switch Bridge (ESP32-S3-Zero)" "true"

          COUNT=$(echo "$INCLUDES" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "matrix=$(echo "{\"include\":$INCLUDES}" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "has-firmware-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-firmware-changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          fi

  build-matrix:
    name: Build ${{ matrix.project }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has-firmware-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Fetch external dependencies
        if: matrix.fetch_deps
        working-directory: packages/esp32-projects/${{ matrix.project }}
        run: |
          BP32_DIR="external/bluepad32"
          BTSTACK_ROOT="$BP32_DIR/external/btstack"
          BTSTACK_COMP="$BTSTACK_ROOT/port/esp32/components/btstack"

          echo "Cloning bluepad32 release_v3.10.3..."
          git clone --depth 1 --branch release_v3.10.3 \
            https://github.com/ricardoquesada/bluepad32.git "$BP32_DIR"
          cd "$BP32_DIR" && git submodule update --init --depth 1 external/btstack && cd -

          echo "Preparing btstack component..."
          for dir in src 3rd-party/bluedroid 3rd-party/hxcmod-player \
                     3rd-party/lwip/dhcp-server 3rd-party/lc3-google \
                     3rd-party/md5 3rd-party/micro-ecc 3rd-party/yxml \
                     platform/freertos platform/lwip; do
            mkdir -p "$BTSTACK_COMP/$(dirname "$dir")"
            cp -r "$BTSTACK_ROOT/$dir" "$BTSTACK_COMP/$dir"
          done
          mkdir -p "$BTSTACK_COMP/platform/embedded"
          for f in hal_time_ms.h hal_uart_dma.h hci_dump_embedded_stdout.h hci_dump_embedded_stdout.c; do
            cp "$BTSTACK_ROOT/platform/embedded/$f" "$BTSTACK_COMP/platform/embedded/"
          done
          echo "Dependencies ready"

      - name: Build ${{ matrix.project }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ matrix.target }}
          command: >-
            cd packages/esp32-projects/${{ matrix.project }} &&
            idf.py build &&
            echo "# Build Size Analysis for ${{ matrix.project }}" > size-report.txt &&
            idf.py size >> size-report.txt 2>&1;
            idf.py size-components >> size-report.txt 2>&1; true

      - name: Archive firmware binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-firmware-${{ github.sha }}
          path: |
            packages/esp32-projects/${{ matrix.project }}/build/*.bin
            packages/esp32-projects/${{ matrix.project }}/build/*.elf
            packages/esp32-projects/${{ matrix.project }}/build/*.map
            packages/esp32-projects/${{ matrix.project }}/build/bootloader/*.bin
            packages/esp32-projects/${{ matrix.project }}/build/partition_table/*.bin
          retention-days: 30

      - name: Archive size analysis
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-size-report-${{ github.sha }}
          path: packages/esp32-projects/${{ matrix.project }}/size-report.txt
          retention-days: 30

      - name: Check binary size limits
        working-directory: packages/esp32-projects/${{ matrix.project }}
        run: |
          # Extract app binary size
          APP_SIZE=$(stat -c%s "build/${{ matrix.project }}.bin" 2>/dev/null || stat -f%z "build/${{ matrix.project }}.bin" 2>/dev/null || echo "0")

          # Set warning threshold (1.5 MB for OTA projects)
          WARNING_THRESHOLD=1572864  # 1.5 MB
          CRITICAL_THRESHOLD=1835008  # 1.75 MB

          echo "Application binary size: $APP_SIZE bytes ($(($APP_SIZE / 1024)) KB)"

          if [ $APP_SIZE -gt $CRITICAL_THRESHOLD ]; then
            echo "::error::Binary size ($APP_SIZE bytes) exceeds critical threshold ($CRITICAL_THRESHOLD bytes)!"
            echo "This may not fit in OTA partitions. Consider optimizing code or disabling features."
            exit 1
          elif [ $APP_SIZE -gt $WARNING_THRESHOLD ]; then
            echo "::warning::Binary size ($APP_SIZE bytes) exceeds warning threshold ($WARNING_THRESHOLD bytes)."
            echo "Consider optimizing code to leave headroom for OTA updates."
          else
            echo "::notice::Binary size is within acceptable limits."
          fi

  build-simulation:
    name: Build Python Simulation
    needs: [detect-changes]
    if: >
      needs.detect-changes.outputs.simulation-changed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: packages/esp32-projects/robocar-simulation
        run: uv sync

      - name: Check imports
        working-directory: packages/esp32-projects/robocar-simulation
        run: |
          uv run python -c "import sys; print(f'Python {sys.version}')"
          uv run python -c "import numpy; print(f'NumPy {numpy.__version__}')"
          uv run python -c "import pymunk; print(f'Pymunk {pymunk.version}')"

  build-esphome:
    name: Build ESPHome ${{ matrix.device.name }}
    needs: [detect-changes]
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.audiobook-player-changed == 'true' ||
      needs.detect-changes.outputs.esp32-wireguard-ha-changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: audiobook-player
            yaml: packages/esp32-projects/audiobook-player/audiobook-player.yaml
            changed: audiobook-player-changed
          - name: esp32-wireguard-ha
            yaml: packages/esp32-projects/esp32-wireguard-ha-example/esp32-wireguard-ha.yaml
            changed: esp32-wireguard-ha-changed
    steps:
      - name: Check if this device changed
        id: should-build
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif [ "${{ needs.detect-changes.outputs[matrix.device.changed] }}" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.should-build.outputs.build == 'true'
        uses: actions/checkout@v6

      - name: Generate dummy secrets.yaml for CI
        if: steps.should-build.outputs.build == 'true'
        run: |
          YAML_DIR=$(dirname "${{ matrix.device.yaml }}")
          YAML_FILE=$(basename "${{ matrix.device.yaml }}")
          cd "$YAML_DIR"

          SECRETS=$(grep -oP '!secret\s+\K\w+' "$YAML_FILE" | sort -u)

          echo "# Auto-generated dummy secrets for CI builds" > secrets.yaml
          for secret in $SECRETS; do
            case "$secret" in
              *key*|*encryption*)
                echo "${secret}: \"QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=\"" >> secrets.yaml
                ;;
              *password*|*pass*)
                echo "${secret}: \"ci_placeholder_password\"" >> secrets.yaml
                ;;
              *ssid*)
                echo "${secret}: \"CI_PLACEHOLDER_SSID\"" >> secrets.yaml
                ;;
              *ip*|*address*|*gateway*|*subnet*|*dns*)
                echo "${secret}: \"10.0.0.1\"" >> secrets.yaml
                ;;
              *port*)
                echo "${secret}: \"51820\"" >> secrets.yaml
                ;;
              *)
                echo "${secret}: \"ci_placeholder\"" >> secrets.yaml
                ;;
            esac
          done

      - name: Build ESPHome firmware
        if: steps.should-build.outputs.build == 'true'
        uses: esphome/build-action@v7
        id: build
        with:
          yaml-file: ${{ matrix.device.yaml }}

      - name: Archive ESPHome firmware
        if: steps.should-build.outputs.build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.device.name }}-esphome-${{ github.sha }}
          path: ${{ steps.build.outputs.name }}/
          retention-days: 30

  build-summary:
    name: Build Summary
    needs: [detect-changes, build-matrix, build-simulation, build-esphome]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-matrix.result }}" = "failure" ]; then
            echo "::error::ESP32 build matrix failed!"
            exit 1
          fi
          if [ "${{ needs.build-simulation.result }}" = "failure" ]; then
            echo "::warning::Simulation build failed, but continuing..."
          fi
          if [ "${{ needs.build-esphome.result }}" = "failure" ]; then
            echo "::warning::ESPHome build failed, but continuing..."
          fi
          echo "::notice::Build pipeline completed!"
