name: Claude Auto-fix CI Failures

on:
  workflow_run:
    workflows: ["Test Suite", "ESP32 Build Pipeline"]
    types: [completed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze, or "all" for every open PR with failures'
        required: true
        type: string

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Fan-out job: when "all" is specified, find every open PR with a failed run
  # and re-dispatch this workflow once per PR
  fan-out:
    name: Dispatch auto-fix for all failing PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.pr_number == 'all'
    permissions:
      actions: write
    steps:
      - name: Find PRs with failed runs and dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DISPATCHED=0
          gh pr list --state open --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"' | \
          while read -r PR_NUM BRANCH; do
            FAILED_RUN=$(gh run list \
              --branch "${BRANCH}" \
              --status failure \
              --json databaseId \
              -q '.[0].databaseId' \
              --limit 1)

            if [ -n "${FAILED_RUN}" ]; then
              echo "Dispatching auto-fix for PR #${PR_NUM} (branch: ${BRANCH}, run: ${FAILED_RUN})"
              gh workflow run auto-fix.yml -f pr_number="${PR_NUM}"
              DISPATCHED=$((DISPATCHED + 1))
            else
              echo "Skipping PR #${PR_NUM} (branch: ${BRANCH}) — no failed runs"
            fi
          done

          echo "Dispatched ${DISPATCHED} auto-fix run(s)"

  # Gather context and delegate to reusable auto-fix workflow
  gather-context:
    name: Gather failure context
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.pr_number != 'all') ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        !startsWith(github.event.workflow_run.head_commit.message, 'fix(auto):')
      )
    permissions:
      actions: read
      pull-requests: read
    outputs:
      branch: ${{ steps.context.outputs.branch }}
      run_id: ${{ steps.context.outputs.run_id }}
      workflow_name: ${{ steps.context.outputs.workflow_name }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      pr_number: ${{ steps.context.outputs.pr_number }}
    steps:
      - name: Resolve failure context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            BRANCH=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json headRefName -q '.headRefName')
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch "${BRANCH}" \
              --status failure \
              --json databaseId \
              -q '.[0].databaseId' \
              --limit 1)
            if [ -z "${RUN_ID}" ]; then
              echo "::error::No failed workflow runs found for PR #${PR_NUMBER}"
              exit 1
            fi
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH}" --json number -q '.[0].number // empty' 2>/dev/null || echo "")
          fi

          WORKFLOW_NAME=$(gh run view "${RUN_ID}" --repo "${{ github.repository }}" --json workflowName -q '.workflowName')
          HEAD_SHA=$(gh run view "${RUN_ID}" --repo "${{ github.repository }}" --json headSha -q '.headSha')

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "workflow_name=${WORKFLOW_NAME}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

  auto-fix:
    name: Auto-fix CI failure
    needs: gather-context
    uses: laurigates/.github/.github/workflows/reusable-auto-fix.yml@main
    with:
      branch: ${{ needs.gather-context.outputs.branch }}
      run_id: ${{ needs.gather-context.outputs.run_id }}
      workflow_name: ${{ needs.gather-context.outputs.workflow_name }}
      head_sha: ${{ needs.gather-context.outputs.head_sha }}
      pr_number: ${{ needs.gather-context.outputs.pr_number }}
      auto_fixable_description: |
        - C/C++ formatting errors (clang-format)
        - Python formatting errors (ruff format)
        - Python linting issues with auto-fixable rules (ruff check --fix)
        - Pre-commit hook failures caused by formatting or trailing whitespace
        - Simple typos or syntax errors in C/C++/Python code
        - Missing trailing newlines or whitespace issues
        - Simple cppcheck warnings with clear fixes (unused variables, missing initializers)
      not_auto_fixable_description: |
        - ESP-IDF build errors requiring architectural changes or missing components
        - Complex C/C++ compilation errors (missing headers, linker errors)
        - Test failures in the Python simulation that require logic changes
        - Binary size threshold exceeded (requires optimization decisions)
        - ESP-IDF version incompatibilities or SDK configuration issues
        - Missing secrets or environment variable configuration
        - Failures in the CI workflow configuration itself
        - External service/infrastructure failures
        - sdkconfig or partition table changes that could affect device behavior
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
