name: Build balancebot

on:
  push:
    branches: [main, develop, 'claude/**']
    paths:
      - 'packages/robotics/balancebot/**'
      - '.github/workflows/build-balancebot.yml'
      - '.github/workflows/_ci-build-pico.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/robotics/balancebot/**'
      - '.github/workflows/build-balancebot.yml'
      - '.github/workflows/_ci-build-pico.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci-build:
    uses: ./.github/workflows/_ci-build-pico.yml
    with:
      project: balancebot
      project_path: robotics/balancebot
      board: seeed_xiao_rp2350
