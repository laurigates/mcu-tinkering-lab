name: Enforce Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# The reusable workflow needs pull-requests: write to rewrite PR titles;
# a called workflow cannot exceed the caller's grant, so it must be here.
permissions:
  pull-requests: write

jobs:
  conventional-commits:
    uses: laurigates/.github/.github/workflows/reusable-enforce-conventional-commits.yml@main
